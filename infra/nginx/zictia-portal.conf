# ZICTIA Customer Portal nginx configuration
# Place in /etc/nginx/sites-available/zictia-portal and symlink to sites-enabled

upstream backend {
    server 127.0.0.1:4000;
    # Add more backend instances for load balancing
    # server 127.0.0.1:4001;
}

server {
    listen 80;
    server_name portal.zictia.go.tz;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.zictia.go.tz;

    # SSL certificates (ZICTIA to obtain from trusted CA)
    ssl_certificate /etc/ssl/certs/zictia-portal.crt;
    ssl_certificate_key /etc/ssl/private/zictia-portal.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting zone (requires limit_req_zone in nginx.conf)
    # limit_req zone=api_limit burst=20 nodelay;

    # Static frontend files
    location / {
        root /var/www/zictia-portal/frontend/dist;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        proxy_pass http://backend/health;
        access_log off;
    }
}
